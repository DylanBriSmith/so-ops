# so-ops configuration example — Canadian Bearings
# Copy to config.toml and fill in your values:
#   cp config.example.toml config.toml
#   chmod 600 config.toml          # Linux/Docker
#
# Secrets (passwords, API keys) should NOT go in config.toml.
# Put them in a .env file (loaded automatically by Docker Compose)
# or export them as environment variables before running.
#
# Required env vars:
#   SO_OPS_ES_PASSWORD   — Elasticsearch password
#   SO_OPS_OR_API_KEY    — OpenRouter API key (if using openrouter)

# LLM backend: "openrouter" (cloud, no GPU needed) or "ollama" (local)
llm_provider = "openrouter"

# ── Elasticsearch ────────────────────────────────────────────────────────────
# Security Onion manager at Canadian Bearings.
# The soc_viewer account is a read-only SO web UI account.
# Firewall rule must be applied on the SO manager before this will connect:
#   sudo so-firewall includehost elasticsearch_rest <this-machine-ip>
#   sudo so-firewall apply

[elasticsearch]
host = "https://<so-manager-ip>:9200"
user = "soc_viewer"
password = ""          # set SO_OPS_ES_PASSWORD env var / .env
verify_ssl = false     # SO uses self-signed certs

[elasticsearch.indices]
suricata   = "logs-suricata.alerts-so"
zeek       = "logs-zeek-so"
detections = "logs-detections.alerts-so"
syslog     = "logs-syslog-so"
data_streams = "*so*"

# ── LLM: OpenRouter (cloud) ──────────────────────────────────────────────────
# Get an API key at https://openrouter.ai
# Set SO_OPS_OR_API_KEY in your .env file — do not paste the key here.
# Model options (cheapest → most capable):
#   anthropic/claude-haiku-4-5      fast, cheap, good for triage
#   anthropic/claude-sonnet-4-5     better reasoning, higher cost
#   openai/gpt-4o-mini              OpenAI alternative

[openrouter]
model = "anthropic/claude-haiku-4-5"
api_key = ""           # set SO_OPS_OR_API_KEY env var / .env

# ── LLM: Ollama (local, no API key needed) ───────────────────────────────────
# Uncomment and set llm_provider = "ollama" above to use local inference.
# Install Ollama from https://ollama.com, then: ollama pull qwen3:14b

# [ollama]
# url = "http://localhost:11434"
# model = "qwen3:14b"

# ── Paths ────────────────────────────────────────────────────────────────────

[paths]
data_dir = "~/so-ops-data"

# ── Notifications ────────────────────────────────────────────────────────────
# Enable one or more providers. Test with: so-ops test-notify
# Teams is the primary channel — test carefully before enabling on a schedule,
# the webhook posts to a live shared channel.

[notifications.teams]
enabled = false
# Power Automate HTTP webhook URL — paste your webhook URL here
url = ""

[notifications.ntfy]
enabled = false
url = "https://ntfy.sh"
topic = "so-ops-alerts"

[notifications.email]
enabled = false
smtp_host = ""
smtp_port = 465
from_address = ""
password = ""
to_address = ""

[notifications.discord]
enabled = false
webhook_url = ""

[notifications.slack]
enabled = false
webhook_url = ""

[notifications.gotify]
enabled = false
url = ""
token = ""

[notifications.sms]
enabled = false
twilio_account_sid = ""
twilio_auth_token = ""
from_number = ""
to_number = ""

[notifications.webhook]
enabled = false
url = ""

# ── Correlate ────────────────────────────────────────────────────────────────

[correlate]
# When true, send Teams if grouped triage digest has HIGH alerts but rule patterns did not fire.
notify_on_triage_llm = false

# ── Triage ───────────────────────────────────────────────────────────────────

[triage]
lookback_hours = 24           # how far back each run queries
max_alerts_per_run = 500      # max alert groups sent to LLM per run
max_alerts_per_query = 2000   # ES query result cap
max_batch_size = 50           # alerts per LLM batch call
llm_temperature = 0.1         # low = deterministic classification
scrub_ips = true              # replace real IPs with tokens (INT-001, EXT-001) before sending to LLM
scrub_zones = true            # replace subnet CIDRs with tokens (INT-NET-001) in zone context sent to LLM

# Signatures skipped entirely (no LLM call, auto-classified as NOISE).
# Add any signatures that are confirmed benign in your environment.
[triage.auto_noise]
signatures = [
    "ET INFO Session Traversal Utilities for NAT (STUN Binding Request)",
    "ET INFO Session Traversal Utilities for NAT (STUN Binding Response)",
    "ET INFO Session Traversal Utilities for NAT (STUN Binding Request On Non-Standard High Port)",
    "ET INFO Microsoft Connection Test",
    "ET VOIP Multiple Unauthorized SIP Responses UDP",
    "ET INFO Non-Anonymous LDAPv3 Bind Request Outbound",
    "ET INFO Successful Non-Anonymous LDAPv3 Bind Request Outbound",
]

# Signature prefixes that force a minimum severity regardless of LLM verdict.
[triage.escalation]
minimum_medium = [
    "ET SCAN", "ET EXPLOIT", "ET TROJAN", "ET MALWARE", "ET ATTACK",
    "ET DOS", "ET SHELLCODE", "ET WEB_SERVER", "ET WEB_CLIENT",
    "GPL EXPLOIT", "GPL SHELLCODE", "GPL ATTACK",
]
minimum_high = [
    "ET TROJAN", "ET MALWARE", "ET EXPLOIT Known", "ET ATTACK",
    "ET SHELLCODE", "GPL EXPLOIT",
]

# ── Health ───────────────────────────────────────────────────────────────────

[health]
llm_temperature = 0.3

# ── Vulnerability Scanning ───────────────────────────────────────────────────
# Adjust targets to match your actual network ranges.
# nmap runs inside the Docker container, which has network access to these ranges.

[vulnscan]
targets = [
    "192.168.0.0/24",    # example: server VLAN
    "192.168.1.0/24",    # example: workstation VLAN
]
nmap_bin = "C:/Program Files (x86)/Nmap/nmap.exe"   # Windows; Linux: /usr/bin/nmap
nmap_args = "-sV --script=vulners -T4 --open"
nuclei_docker = "projectdiscovery/nuclei:latest"
nuclei_severity = "medium,high,critical"

# ── Network zones ─────────────────────────────────────────────────────────────
# Used by the LLM to understand which IPs are internal vs external.
# Add a [[network.zones]] block for each subnet in your environment.
# More zones = better triage accuracy.

[network]
internal_prefixes = ["192.168.", "10.", "172.16."]

[[network.zones]]
cidr = "192.168.0.0/24"
name = "Server VLAN"
description = "Security Onion manager, servers, infrastructure"

[[network.zones]]
cidr = "192.168.1.0/24"
name = "Workstation VLAN"
description = "User workstations, laptops, printers"

# Add more zones as needed:
# [[network.zones]]
# cidr = "10.0.0.0/24"
# name = "DMZ"
# description = "Public-facing servers"
